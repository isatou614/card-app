<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - CodeCards</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="header">
    <div class="container">
      <div class="navbar">
        <div class="nav-left">
          <h1>🎯 CodeCards</h1>
        </div>
        <div class="nav-right">
          <button class="btn btn-secondary btn-sm" id="quitBtn">Quit Quiz</button>
        </div>
      </div>
    </div>
  </div>

  <main class="container quiz-container">
    <div id="quizView">
      <div class="quiz-header">
        <h2 id="deckNameQuiz"></h2>
        <span id="cardCounter" style="font-weight: 600;"></span>
      </div>

      <div class="quiz-progress">
        <div class="quiz-progress-bar" id="progressBar" style="width: 0%;"></div>
      </div>

      <div class="flashcard" id="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="flashcard-content">
              <div class="flashcard-label">Question</div>
              <div id="cardFrontContent"></div>
            </div>
          </div>
          <div class="flashcard-back">
            <div class="flashcard-content">
              <div class="flashcard-label">Answer</div>
              <div id="cardBackContent"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="quiz-buttons">
        <button class="btn btn-secondary" id="flipBtn">Flip Card</button>
        <button class="btn btn-danger" id="incorrectBtn">Incorrect</button>
        <button class="btn btn-success" id="correctBtn">Correct</button>
      </div>
    </div>

    <!-- Results View -->
    <div id="resultsView" style="display: none;">
      <div class="result-card">
        <h2>Quiz Complete! 🎉</h2>
        <div class="result-score" id="finalScore"></div>
        <div class="result-message" id="resultMessage"></div>

        <div style="text-align: left; background: var(--gray-50); padding: 1.5rem; border-radius: var(--radius); margin-bottom: 2rem;">
          <h4>Summary</h4>
          <p>Correct Answers: <strong id="correctCount"></strong></p>
          <p>Total Cards: <strong id="totalCount"></strong></p>
          <p>Time Spent: <strong id="timeSpent"></strong></p>
        </div>

        <div style="text-align: left; background: var(--gray-50); padding: 1.5rem; border-radius: var(--radius); margin-bottom: 2rem;">
          <h4>Score History</h4>
          <div id="scoreHistory" style="max-height: 300px; overflow-y: auto;"></div>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: center;">
          <button class="btn btn-primary" id="retakeBtn">Retake Quiz</button>
          <button class="btn btn-secondary" id="backToDeckBtn">Back to Deck</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/quiz.js"></script>
</body>
</html>
